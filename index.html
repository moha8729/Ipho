<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Heart Alert</title>
<style>body{font-family:Arial;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}#card{background:#1f1f1f;padding:24px;border-radius:12px;max-width:360px;text-align:center}button{padding:12px 20px;margin:8px;font-size:18px}</style>
</head><body><div id='card'>
<h1>🚨 Alarmcentralen</h1>
<p>Indgående radiokald</p>
<p><b>Muligt hjertestop<br>Kokkedal Station</b></p>
<button onclick="accept()">Accepter</button>
<button>Afvis</button>
<audio id='a' controls src='assets/alarm.mp3'></audio>
<p id='s'></p>
</div>
<script>
async function accept(){
 document.getElementById('s').textContent='Afspiller besked...';
 if(navigator.vibrate) navigator.vibrate([300,200,300]);
 document.getElementById('a').play().catch(()=>{});
 setTimeout(()=>document.getElementById('s').textContent='🎤 Hold knappen nede for at svare',3000);
}
</script></body></html>
